name: Build Laitoxx APK

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: 'platforms;android-34'

      # Шаг `chmod +x gradlew` удалён – он падал, так как в репозитории отсутствует Gradle Wrapper.
      # Экшен `setup-gradle` автоматически сгенерирует Wrapper и настроит права на выполнение.
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Build APK with Gradle
        run: ./gradlew assemblePy38Debug

      - name: Upload APK as an artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-py38-debug
          path: app/build/outputs/apk/py38/debug/app-py38-debug.apk
